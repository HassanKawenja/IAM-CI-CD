AWSTemplateFormatVersion: '2010-09-09'
Description: Create an IAM Role via CI/CD

Resources:
  MyCICDRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MyCICDDeployedRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess